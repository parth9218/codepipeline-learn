AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CodePipeline Learning Demo: GitHub -> Build -> Test -> Deploy (CloudFormation).
  Stage 1 Source pulls code from GitHub on every push via CodeStar Connection.
  Stage 2 Build compiles TypeScript and runs CDK synth to produce CFN template.
  Stage 3 Test runs CDK assertion unit tests and integration tests via temp stack.
  Stage 4 Deploy uses the CloudFormation action to deploy the production app stack.

# =============================================================================
# PARAMETERS
# =============================================================================

Parameters:

  GitHubOwner:
    Type: String
    Description: "GitHub username or organisation (e.g. my-org)"

  GitHubRepo:
    Type: String
    Description: "Repository name — must contain app/, infra/, buildspec/, pipeline/"

  GitHubBranch:
    Type: String
    Default: main
    Description: "Branch that triggers the pipeline on every push"

  LambdaFunctionName:
    Type: String
    Default: hello-api-function
    Description: >
      Physical name of the Lambda function created by CDK.
      Passed as the FunctionName parameter to the CDK stack so the name
      is identical in both the test and production stacks.

  ProdStackName:
    Type: String
    Default: hello-api-prod-stack
    Description: "Name of the production CloudFormation app stack"

  TestStackName:
    Type: String
    Default: hello-api-TEST-stack
    Description: "Name of the ephemeral test stack (created + deleted each test run)"

# =============================================================================
# RESOURCES
# =============================================================================

Resources:

  # ---------------------------------------------------------------------------
  # 1. GITHUB CONNECTION (CodeStar)
  # ---------------------------------------------------------------------------
  # After the stack is created go to:
  #   AWS Console -> CodePipeline -> Settings -> Connections
  # and click "Update pending connection" to authorize via GitHub OAuth.
  # The pipeline will not start until the status changes to AVAILABLE.
  # ---------------------------------------------------------------------------

  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: !Sub "github-${GitHubRepo}"
      ProviderType: GitHub

  # ---------------------------------------------------------------------------
  # 2. ARTIFACT STORAGE
  # CodePipeline stores stage inputs/outputs here. Each action reads from and
  # writes to named artifacts which are transparently managed by CodePipeline.
  # ---------------------------------------------------------------------------

  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "codepipeline-artifacts-${AWS::AccountId}-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # ---------------------------------------------------------------------------
  # 3. IAM ROLES
  # ---------------------------------------------------------------------------

  # -- 3a. CloudFormation Deploy Role -----------------------------------------
  # The CloudFormation action in the Deploy stage assumes this role when it
  # creates or updates the production app stack. It needs permission to create
  # every resource the CDK stack defines: Lambda, API Gateway, IAM roles.
  CloudFormationDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "CfnDeployRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CfnDeployPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # Lambda — create/update/version/alias the application function
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:PublishVersion
                  - lambda:CreateAlias
                  - lambda:UpdateAlias
                  - lambda:DeleteAlias
                  - lambda:GetAlias
                  - lambda:ListVersionsByFunction
                  - lambda:TagResource
                Resource: "*"

              # IAM — CDK creates an execution role for the Lambda function
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*"

              # API Gateway — CDK creates a REST API, methods, stage, and deployment
              - Effect: Allow
                Action:
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:DELETE
                  - apigateway:GET
                  - apigateway:HEAD
                  - apigateway:OPTIONS
                Resource: !Sub "arn:aws:apigateway:${AWS::Region}::/*"

              # S3 — CloudFormation reads the Lambda asset ZIP from the artifact bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "${ArtifactBucket.Arn}/*"

              # CloudWatch Logs — API Gateway logs to CloudWatch
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DescribeLogGroups
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"

  # -- 3b. CodeBuild Role -----------------------------------------------------
  # Shared by the Build and Test CodeBuild projects.
  # Needs S3 access for artifacts, CloudWatch Logs for build output, and
  # CFN/Lambda/IAM/API Gateway access to deploy the ephemeral test stack.
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "CodeBuildRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # CloudWatch Logs — CodeBuild streams build output here
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"

              # S3 — Read source & write output artifacts
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"

              # STS — CDK uses this to determine account/region for env-aware stacks
              - Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: "*"

              # CloudFormation — deploy/describe/delete the ephemeral test stack
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DeleteChangeSet
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/*"

              # Lambda — deploy + invoke the function in the test stack
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetAlias
                  - lambda:CreateAlias
                  - lambda:UpdateAlias
                  - lambda:DeleteAlias
                  - lambda:PublishVersion
                  - lambda:ListVersionsByFunction
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:InvokeFunction
                  - lambda:TagResource
                Resource: "*"

              # IAM — CDK creates execution roles for Lambda inside test stack
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*"

              # API Gateway — test stack includes a REST API
              - Effect: Allow
                Action:
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:DELETE
                  - apigateway:GET
                Resource: !Sub "arn:aws:apigateway:${AWS::Region}::/*"

              # CodeStarConnections — needed for source artifact download
              - Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref GitHubConnection

  # -- 3c. Pipeline Role ------------------------------------------------------
  # The pipeline itself assumes this role to orchestrate all stage actions.
  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "PipelineRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # S3 — read/write artifacts
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"

              # CodeBuild — start builds for Build and Test stages
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: "*"

              # CloudFormation — drive the Deploy stage CloudFormation action
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:SetStackPolicy
                  - cloudformation:ValidateTemplate
                Resource: "*"

              # GitHub connection — source action
              - Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref GitHubConnection

              # PassRole — pipeline passes CloudFormationDeployRole to the CFN action
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CloudFormationDeployRole.Arn

  # ---------------------------------------------------------------------------
  # 4. CODEBUILD PROJECTS
  # ---------------------------------------------------------------------------

  # -- 4a. Build Project (Stage 2) --------------------------------------------
  # Compiles TypeScript (tsc -> app/dist/) and synthesises the CDK stack
  # into a CloudFormation template (cdk synth -> cdk.out/).
  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${AWS::StackName}-build"
      Description: "Compile TypeScript + CDK synth -> CloudFormation template"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          # CDK uses these env vars when synthesising an environment-aware stack
          - Name: CDK_DEFAULT_ACCOUNT
            Value: !Ref AWS::AccountId
          - Name: CDK_DEFAULT_REGION
            Value: !Ref AWS::Region
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec/buildspec-build.yaml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/aws/codebuild/${AWS::StackName}-build"

  # -- 4b. Test Project (Stage 3) ---------------------------------------------
  # Phase A: jest CDK assertion tests (no AWS calls, template inspection only)
  # Phase B: deploy ephemeral test stack -> curl API -> verify HTTP 200 -> teardown
  TestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${AWS::StackName}-test"
      Description: "CDK assertion tests + integration test via ephemeral CFN stack"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: TEST_STACK_NAME
            Value: !Ref TestStackName
          - Name: TEST_FUNCTION_NAME
            Value: !Sub "${LambdaFunctionName}-test"
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec/buildspec-test.yaml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/aws/codebuild/${AWS::StackName}-test"

  # ---------------------------------------------------------------------------
  # 5. THE PIPELINE
  # ---------------------------------------------------------------------------

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${AWS::StackName}-pipeline"
      RoleArn: !GetAtt PipelineRole.Arn
      # V2 pipelines use an explicit Triggers block for source detection.
      # V1 used DetectChanges in the Source action config — that is ignored on V2.
      PipelineType: V2
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      RestartExecutionOnUpdate: false

      # ── Trigger: fire on every push to the configured branch ────────────────
      # This replaces the V1 DetectChanges:true Source action config.
      # CodePipeline registers a GitHub webhook via the CodeStar Connection
      # and starts a new execution whenever a push matches this filter.
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: GitHubSource
            Push:
              - Branches:
                  Includes:
                    - !Ref GitHubBranch

      Stages:

        # ── Stage 1: SOURCE ──────────────────────────────────────────────────
        # Downloads the repo ZIP on every push matched by the Trigger above.
        # ---------------------------------------------------------------------
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref GitHubConnection
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
                # CODE_ZIP preserves file permissions (important for shell scripts)
                OutputArtifactFormat: CODE_ZIP
              OutputArtifacts:
                - Name: SourceArtifact

        # ── Stage 2: BUILD ───────────────────────────────────────────────────
        # buildspec-build.yaml:
        #   1. npm ci (app + infra)
        #   2. tsc -> app/dist/
        #   3. cdk synth -> cdk.out/ApiStack.template.json
        #
        # BuildArtifact contains the full workspace including cdk.out/ so the
        # Test and Deploy stages can reference the synthesised template directly.
        # ---------------------------------------------------------------------
        - Name: Build
          Actions:
            - Name: BuildAndSynth
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref BuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifact

        # ── Stage 3: TEST ────────────────────────────────────────────────────
        # buildspec-test.yaml:
        #   Phase A — jest CDK assertion tests (no AWS, template inspection)
        #   Phase B — deploy ephemeral CFN stack -> curl -> assert HTTP 200 -> delete
        #
        # Non-zero exit = pipeline FAILS here. Nothing proceeds to production.
        # ---------------------------------------------------------------------
        - Name: Test
          Actions:
            - Name: CdkAssertionsAndIntegrationTest
              ActionTypeId:
                Category: Test
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref TestProject
              InputArtifacts:
                - Name: BuildArtifact

        # ── Stage 4: DEPLOY ──────────────────────────────────────────────────
        # The native CloudFormation action deploys (or updates) the production
        # app stack directly from the CDK-synthesised template in BuildArtifact.
        #
        # Action type: CHANGE_SET_REPLACE + CHANGE_SET_EXECUTE (two sub-actions)
        # ensures CloudFormation always produces a change-set for review before
        # executing, which is the recommended production pattern.
        #
        # CodePipeline passes CloudFormationDeployRole to CloudFormation so only
        # the specific permissions in that role are used during the update.
        # ---------------------------------------------------------------------
        - Name: Deploy
          Actions:

            # Action 1: Compute what will change (creates/updates a change set)
            - Name: CreateChangeSet
              RunOrder: 1
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CHANGE_SET_REPLACE
                StackName: !Ref ProdStackName
                ChangeSetName: !Sub "${ProdStackName}-changeset"
                # infra/cdk.out/ApiStack.template.json is the synthesised template.
                # BuildArtifact::path syntax tells CodePipeline where to find it.
                TemplatePath: "BuildArtifact::infra/cdk.out/ApiStack.template.json"
                # Pass function name so test and prod stacks share the same name
                ParameterOverrides: !Sub |
                  {
                    "FunctionName": "${LambdaFunctionName}"
                  }
                Capabilities: "CAPABILITY_IAM,CAPABILITY_NAMED_IAM,CAPABILITY_AUTO_EXPAND"
                RoleArn: !GetAtt CloudFormationDeployRole.Arn
              InputArtifacts:
                - Name: BuildArtifact

            # Action 2: Apply the change set computed above
            - Name: ExecuteChangeSet
              RunOrder: 2
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CHANGE_SET_EXECUTE
                StackName: !Ref ProdStackName
                ChangeSetName: !Sub "${ProdStackName}-changeset"
                # After the stack updates, its outputs (ApiUrl, FunctionName, etc.)
                # are captured in this artifact — useful for downstream stages or
                # manual inspection in the Console.
                OutputFileName: stack-outputs.json
              OutputArtifacts:
                - Name: StackOutputs

# =============================================================================
# OUTPUTS
# =============================================================================

Outputs:

  PipelineUrl:
    Description: "Direct link to the pipeline in the AWS Console"
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${Pipeline}/view"

  GitHubConnectionArn:
    Description: >
      ARN of the CodeStar Connection. After stack creation go to
      CodePipeline -> Settings -> Connections and authorize this connection.
    Value: !Ref GitHubConnection

  ArtifactBucketName:
    Description: "S3 bucket storing all pipeline artifacts"
    Value: !Ref ArtifactBucket

  CloudFormationDeployRoleArn:
    Description: "IAM role assumed by CloudFormation during the Deploy stage"
    Value: !GetAtt CloudFormationDeployRole.Arn
