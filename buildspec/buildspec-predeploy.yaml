# ─────────────────────────────────────────────────────────────────────────────
# PRE-DEPLOY STAGE — buildspec-predeploy.yaml
# ─────────────────────────────────────────────────────────────────────────────
#
# This buildspec runs as the first action in the DEPLOY stage (before CodeDeploy).
# Input:  BuildArtifact (cdk.out/ + compiled app/dist/)
# Output: DeployArtifact (appspec.yaml with real Lambda version ARNs)
#
# What it does:
#   1. Deploys (or updates) the *production* CloudFormation app stack from
#      the CDK-synthesised template. This creates/updates:
#        - Lambda function code
#        - Lambda version (CDK's currentVersion → new AWS::Lambda::Version)
#        - Lambda alias "live" (still pointing to old version)
#        - API Gateway (unchanged URL)
#
#   2. Reads CloudFormation stack outputs to get:
#        - FunctionName — the Lambda function physical name
#        - VersionArn   — the *new* version ARN just created by CloudFormation
#
#   3. Reads the current alias to find the *old* version ARN (pre-deploy pointer).
#
#   4. Generates appspec.yaml with concrete version ARNs so CodeDeploy knows
#      exactly which version to shift traffic FROM and TO.
#
# Why a separate buildspec (not inline in the pipeline)?
#   The appspec.yaml must contain the real Lambda version ARNs, which are only
#   known AFTER CloudFormation converges. This CodeBuild action bridges the gap
#   between "CFN deployed" and "CodeDeploy action reads appspec".
# ─────────────────────────────────────────────────────────────────────────────

version: 0.2

env:
  variables:
    PROD_STACK_NAME:  "hello-api-prod-stack"
    FUNCTION_NAME:    "hello-api-function"        # must match pipeline.yaml param
    ALIAS_NAME:       "live"
    # Injected by CodeBuild project env vars in pipeline.yaml:
    # BEFORE_HOOK_FUNCTION, AFTER_HOOK_FUNCTION

phases:
  build:
    commands:
      - echo "══════════════════════════════════════════════════"
      - echo "  Step 1 — Capture CURRENT alias version ARN"
      - echo "  (before CFN update so we know the 'from' side)"
      - echo "══════════════════════════════════════════════════"
      - |
        REGION=$(aws configure get region || echo "$AWS_DEFAULT_REGION")
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

        # get-alias returns just a version number e.g. "3"; build the full ARN
        CURRENT_VERSION_NUM=$(aws lambda get-alias \
          --function-name "$FUNCTION_NAME" \
          --name "$ALIAS_NAME" \
          --query 'FunctionVersion' --output text 2>/dev/null || echo "1")

        CURRENT_VERSION_ARN="arn:aws:lambda:${REGION}:${ACCOUNT_ID}:function:${FUNCTION_NAME}:${CURRENT_VERSION_NUM}"
        echo "Current alias points to version: $CURRENT_VERSION_NUM"
        echo "CURRENT_VERSION_ARN=$CURRENT_VERSION_ARN" >> /tmp/deploy_env
        echo "REGION=$REGION"                          >> /tmp/deploy_env
        echo "ACCOUNT_ID=$ACCOUNT_ID"                  >> /tmp/deploy_env

      - echo "══════════════════════════════════════════════════"
      - echo "  Step 2 — Deploy production CloudFormation stack"
      - echo "══════════════════════════════════════════════════"
      - |
        aws cloudformation deploy \
          --template-file cdk.out/ApiStack.template.json \
          --stack-name "$PROD_STACK_NAME" \
          --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
          --parameter-overrides FunctionName="$FUNCTION_NAME" \
          --no-fail-on-empty-changeset
        echo "CloudFormation deploy complete ✓"

      - echo "══════════════════════════════════════════════════"
      - echo "  Step 3 — Read new version ARN from stack outputs"
      - echo "══════════════════════════════════════════════════"
      - |
        source /tmp/deploy_env

        NEW_VERSION_ARN=$(aws cloudformation describe-stacks \
          --stack-name "$PROD_STACK_NAME" \
          --query 'Stacks[0].Outputs[?OutputKey==`VersionArn`].OutputValue' \
          --output text)

        echo "New Lambda version ARN : $NEW_VERSION_ARN"
        echo "NEW_VERSION_ARN=$NEW_VERSION_ARN" >> /tmp/deploy_env

      - echo "══════════════════════════════════════════════════"
      - echo "  Step 4 — Generate appspec.yaml for CodeDeploy"
      - echo "══════════════════════════════════════════════════"
      - |
        source /tmp/deploy_env

        # CodeDeploy reads appspec.yaml from the output artifact of this action.
        # It tells CodeDeploy:
        #   - Which function/alias to update
        #   - Which version to route traffic *from* (CurrentVersion)
        #   - Which version to route traffic *to*   (TargetVersion)
        #   - Which Lambda functions to call as lifecycle hooks
        cat > appspec.yaml << APPSPEC
        version: 0.0
        Resources:
          - HelloFunction:
              Type: AWS::Lambda::Function
              Properties:
                Name: "${FUNCTION_NAME}"
                Alias: "${ALIAS_NAME}"
                CurrentVersion: "${CURRENT_VERSION_ARN}"
                TargetVersion: "${NEW_VERSION_ARN}"
        Hooks:
          - BeforeAllowTraffic: "${BEFORE_HOOK_FUNCTION}"
          - AfterAllowTraffic:  "${AFTER_HOOK_FUNCTION}"
        APPSPEC

        # Remove leading spaces (heredoc indent artifact)
        sed -i 's/^        //' appspec.yaml

        echo "Generated appspec.yaml:"
        cat appspec.yaml

  post_build:
    commands:
      - echo "Pre-deploy stage complete. CodeDeploy will now shift traffic ✓"

# Only the appspec needs to go to the next CodeDeploy action.
artifacts:
  files:
    - appspec.yaml
  discard-paths: yes
